version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./twisted-stacks-agentic-team/qdrant/storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__MAX_CONNECTIONS: 500
      QDRANT__SERVICE__MAX_REQUEST_SIZE: 1048576
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
